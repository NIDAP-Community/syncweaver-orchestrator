title: fnl
author: Kelly Sovacool
version: 0.2.0
quarto-required: ">=1.5.0"
contributes:
  formats:
    html:
      theme:
        light: [flatly, fnl-light.scss]
        dark: [darkly, fnl-dark.scss]
      toc: true
      code-fold: show
    dashboard:
      theme:
        light: [flatly, fnl-light.scss]
        dark: [darkly, fnl-dark.scss]
      code-fold: hide
    revealjs:
      theme: fnl-light-revealjs.scss

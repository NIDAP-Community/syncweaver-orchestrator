name: syncweaver-update-hosts

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_repo:
        description: The source repository to dispatch to hosts (OWNER/REPO or https://github.com/OWNER/REPO)
        required: true
        type: string
      source_ref:
        description: Source ref to dispatch to hosts (e.g. release tag or branch name).
        required: true
        type: string
      syncweaver-version:
        description: syncweaver version/ref to install (e.g. version tag, branch name, or commit SHA). Will use docker image if available.
        required: true
        type: string
        default: "main"

permissions:
  contents: read

jobs:
  prepare-host-matrix:
    runs-on: ubuntu-latest
    outputs:
      source_repository: ${{ steps.resolve_source_repository.outputs.source_repository }}
      hosts: ${{ steps.build_matrix.outputs.hosts }}
      count: ${{ steps.build_matrix.outputs.count }}
    env:
      SOURCE_REPOSITORY_RAW: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_repository || github.event.inputs.source_repo || '' }}
      SOURCE_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ref || github.event.inputs.source_ref || '' }}
      SYNCWEAVER_VERSION: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload['syncweaver-version'] || github.event.inputs['syncweaver-version'] || 'main' }}
    steps:
      - name: Validate source ref
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SOURCE_REF//[[:space:]]/}" ]]; then
            echo "Error: source_ref is required. Provide client_payload.ref for repository_dispatch or source_ref for workflow_dispatch." >&2
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup syncweaver
        uses: CCBR/syncweaver/actions/setup-syncweaver@main
        with:
          syncweaver-version: ${{ env.SYNCWEAVER_VERSION }}

      - name: Resolve source repository
        id: resolve_source_repository
        shell: python
        run: |
          import os
          import pathlib

          raw_value = os.environ.get("SOURCE_REPOSITORY_RAW", "").strip()
          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          if not raw_value:
            raise SystemExit(
              "Error: source repository is required. Provide client_payload.source_repository for repository_dispatch "
              "or source_repo for workflow_dispatch."
            )

          def owner_repo_from_input(value: str) -> str:
            candidate = value.strip()
            if candidate.endswith(".git"):
              candidate = candidate[:-4]

            if "@" in candidate and ":" in candidate and "/" in candidate:
              # Convert SSH SCP-like form git@host:owner/repo to owner/repo.
              return candidate.rsplit(":", 1)[-1].strip("/")

            if "://" in candidate:
              path = candidate.split("://", 1)[1]
              if "/" in path:
                path = path.split("/", 1)[1]
              return path.strip("/")

            return candidate.strip("/")

          source_repository = owner_repo_from_input(raw_value)
          if not source_repository or "/" not in source_repository:
            raise SystemExit(
              "Error: unable to resolve source repository in OWNER/REPO format from input: "
              f"{raw_value}"
            )

          with output_path.open("a", encoding="utf-8") as fh:
            fh.write(f"source_repository={source_repository}\n")

      - name: Build host matrix from registry
        id: build_matrix
        shell: bash
        env:
          SOURCE_REPOSITORY: ${{ steps.resolve_source_repository.outputs.source_repository }}
          HOST_REGISTRY_FILE: .github/host-repositories.yml
        run: |
          set -euo pipefail
          syncweaver-python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import pathlib

          from syncweaver.host_registry import (
            build_host_matrix_from_registry,
            source_repo_in_host_lockfile,
          )

          source_repository = os.environ["SOURCE_REPOSITORY"].strip()
          registry_path = pathlib.Path(os.environ["HOST_REGISTRY_FILE"])

          try:
              matrix_hosts = build_host_matrix_from_registry(
                  registry_path=registry_path,
                  source_repository=source_repository,
              )
          except (FileNotFoundError, ValueError) as exc:
              raise SystemExit(f"Error: {exc}") from exc

          if not matrix_hosts:
              source_ref = os.environ.get("SOURCE_REF", "")
              raise SystemExit(
                  "Error: No host repositories matched .github/host-repositories.yml for this dispatch. "
                  "Actionable guidance: "
                  "1) Verify .github/host-repositories.yml exists and defines a top-level 'hosts' list. "
                  "2) Ensure each host item has a 'repository' field in OWNER/REPO format (the optional 'name' field is not used). "
                  "3) If a host defines 'source_repository', it must match SOURCE_REPOSITORY for this dispatch. "
                  f"Debug context: SOURCE_REPOSITORY={source_repository}; "
                  f"SOURCE_REF={source_ref}; "
                  f"HOST_REGISTRY_FILE={registry_path}"
              )

          filtered_hosts = []
          for host in matrix_hosts:
              host_repo = host.get("repository", "")
              lockfile = host.get("lockfile", ".syncweaver-lock.json")
              if source_repo_in_host_lockfile(
                  source_repository=source_repository,
                  host_repository=host_repo,
                  lockfile_path=lockfile,
                  ref="main",
              ):
                  filtered_hosts.append(host)

          if not filtered_hosts:
              source_ref = os.environ.get("SOURCE_REF", "")
              raise SystemExit(
                  "Error: No host repositories have the source repository tracked in their lockfile. "
                  f"Source repository '{source_repository}' was not found in any host's lockfile. "
                  "Actionable guidance: "
                  "1) Verify the source repository has been added to host lockfiles via 'syncweaver add'. "
                  "2) Check that host lockfiles exist at the paths specified in .github/host-repositories.yml. "
                  f"Debug context: SOURCE_REPOSITORY={source_repository}; "
                  f"SOURCE_REF={source_ref}; "
                  f"Initial matched hosts: {len(matrix_hosts)}; "
                  f"After lockfile filtering: {len(filtered_hosts)}"
              )

          print(f"count={len(filtered_hosts)}")
          print(f"hosts={json.dumps(filtered_hosts)}")
          PY

      - name: Print selected hosts
        shell: bash
        run: |
          set -euo pipefail
          echo "source_repository=${{ steps.resolve_source_repository.outputs.source_repository }}"
          echo "source_ref=${SOURCE_REF}"
          echo "selected_hosts=${{ steps.build_matrix.outputs.count }}"

  update-host-source-direct:
    runs-on: ubuntu-latest
    needs: prepare-host-matrix
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.prepare-host-matrix.outputs.hosts) }}
    env:
      SOURCE_REPOSITORY: ${{ needs.prepare-host-matrix.outputs.source_repository }}
      SOURCE_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ref || github.event.inputs.source_ref || '' }}
      SYNCWEAVER_VERSION: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload['syncweaver-version'] || github.event.inputs['syncweaver-version'] || 'main' }}
    steps:
      - name: Update host directly
        uses: CCBR/syncweaver/actions/update-host-source-direct@main
        with:
          source_repository: ${{ env.SOURCE_REPOSITORY }}
          host_repository: ${{ matrix.host.repository }}
          lockfile: ${{ matrix.host.lockfile }}
          remote_subdir: ${{ matrix.host.remote_subdir }}
          source_ref: ${{ env.SOURCE_REF }}
          app_id: ${{ vars.CCBR_BOT_APP_ID }}
          app_private_key: ${{ secrets.CCBR_BOT_PRIVATE_KEY }}
          syncweaver-version: ${{ env.SYNCWEAVER_VERSION }}
